<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gnosis - Home</title>  
    
</head>
<body>
    <div class="layout-home">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-top">
            <div class="logo-container">
                <div class="logo-icon">
                    <img id="logo_estrela" src="./img/logo_gnosis.png">
                </div>
                <span class="logo-text">
                    Gnosis
                </span>
            </div>

            <div class="user-card">

                <div class="icon_user" id="icon-user"></div>

                <div>
                    <h4 id="nome-user"></h4>
                    <p id="email-user"></p>
                </div>

            </div>

            <nav class="menu-sidebar">
                <button type="button" class="menu-item active">
                    Calendário
                </button>
            </nav>

        </div>

        <div class="sidebar-bottom">
            <!-- POR ENQUANTO VOU COLOCAR APENAS PARA ELE VOLTAR PARA O INDEX -->
            <a href="#" id="btn-logout" class="logout-button">
                <i class="fa-solid fa-right-from-bracket me-2"></i> Sair da Conta
            </a>

        </div>

    </aside>

    <!-- CONTEÚDO -->
    <main class="main-content">

        <!-- HEADER -->
        <header class="navbar-home">
            <div class="mes-seletor">
                <button id="mes-anterior" class="botoes-mes"><i class="fa-solid fa-angle-left"></i></button>
                <span id="mes-ano" style="margin: 0px 20px;"></span>
                <button id="proximo-mes" class="botoes-mes"><i class="fa-solid fa-angle-right"></i></button>
            </div>

            <div class="havbar-home-acoes">

                <input
                    type="text"
                    placeholder="Buscar atividades..."
                    class="campo-pesquisa-atividade"
                >

                <button type="button" class="btn-add-atividade" onclick="exibir_cadastrar_atividade('');" data-bs-toggle="modal">
                    + Nova Atividade
                </button>

            </div>

        </header>

        <!-- CALENDÁRIO -->
        <section class="calendario-container">

            <table class="calendario">

                <thead>
                    <tr>
                        <th style="width: 14.285%;">Domingo</th>
                        <th style="width: 14.285%;">Segunda</th>
                        <th style="width: 14.285%;">Terça</th>
                        <th style="width: 14.285%;">Quarta</th>
                        <th style="width: 14.285%;">Quinta</th>
                        <th style="width: 14.285%;">Sexta</th>
                        <th style="width: 14.285%;">Sábado</th>
                    </tr>
                </thead>

                <tbody id="dias-calendario">
                    <!-- DIAS -->
                    <!-- TEM QUE CRIAR UM LAÇO DE REPETIÇÃO DE ACORDO COM O DIA, DEFINIR OS IDS DE ACORDO COM DIA, MES E ANO, PARA PREENCHER DEPOIS DE FORMA DINÂMICA -->
                </tbody>

            </table>

        </section>

    </main>

    </div>
    <!-- MODAIS -->
     <div class="modal fade" id="cadastrar_atividade" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-light text-dark">
                <div class="modal-header">
                    <img id="logo_estrela" src="./img/logo_gnosis.png" alt="logo_gnosis">
                    <h5 class="modal-title ms-2" id="exampleModalLabel">Gnosis - Cadastrar Atividade</h5>
                    <button type="button" class="btn-close btn-close-black" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="form_cadastrar_atividade">
                        <section class="m-2 mb-3">                      
                            <div class="input-group-custom">
                                <i class="fa-solid fa-list-check icon-input"></i>
                                <input id="titulo_cadastrar_atividade" name="titulo_cadastrar_atividade" class="form-control custom-input bg-secondary bg-opacity-10" type="text" placeholder="Digite o Título da Atividade:" required>
                            </div>
                        </section>
                        <section class="m-2 mb-3">                      
                            <div class="input-group-custom">
                                <i class="fa-solid fa-file-alt icon-input"></i>
                                <input id="descricao_cadastrar_atividade" name="descricao_cadastrar_atividade" class="form-control custom-input bg-secondary bg-opacity-10" type="text" placeholder="Digite a Descrição da Atividade:">
                            </div>
                        </section>
                        
                        <section class="m-2 mb-3">                      
                            <div class="d-flex gap-2 align-items-center">
                                <div class="input-group-custom flex-grow-1">
                                    <select class="form-select custom-input bg-secondary bg-opacity-10" name="idMaterias_cadastrar_atividade" id="idMaterias_cadastrar_atividade" required>
                                        <option value="" selected disabled>Escolha uma matéria</option>
                                        </select>
                                </div>
                                <button type="button" class="btn text-light BOTAO_DOURADO d-flex align-items-center justify-content-center"  onclick="exibir_cadastrar_materia();" style="height: 48px; width: 48px; padding: 0; border-radius: 8px;">
                                    <i class="fa-solid fa-plus"></i>
                                </button>
                            </div>
                        </section>

                        <section class="m-2 mb-3">                      
                            <div class="input-group-custom">
                                <i class="fa fa-clock icon-input"></i>
                                <input name="hora_vencimento_cadastrar_atividade" id="hora_vencimento_cadastrar_atividade" class="form-control custom-input bg-secondary bg-opacity-10" type="time" placeholder="Digite o horário de vencimento:" required>
                            </div>
                        </section>
                         <section class="m-2 mb-3">                      
                            <div class="input-group-custom">
                                <i class="fa-regular fa-calendar icon-input"></i>
                                <input name="data_vencimento_cadastrar_atividade" id="data_vencimento_cadastrar_atividade" class="form-control custom-input bg-secondary bg-opacity-10" type="date" required>
                            </div>
                        </section>
                        <div class="d-grid mt-2">
                            <button type="submit" id="btn_cadastrar_atividade" class="btn text-light BOTAO_DOURADO">
                                <strong class="me-1">Cadastrar Atividade</strong>
                            </button>
                        </div>
                    </form>
                </div>                    
            </div>
        </div>
    </div>
    
   <div class="modal fade" id="editar_atividade" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-light text-dark">
                <div class="modal-header">
                    <img id="logo_estrela" src="./img/logo_gnosis.png" alt="logo_gnosis">
                    <h5 class="modal-title ms-2" id="exampleModalLabel">Gnosis - Editando Atividade</h5>
                    <button type="button" class="btn-close btn-close-black" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">                    
                    <form id="form_editar_atividade">
                        <input type="hidden" id="idAtividade">
                        <section class="mt-2 mb-3">
                            <div class="d-flex gap-3 d-flex flex-row justify-content-around">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="status_editar_atividade" id="status_pendente" value="Pendente" checked>
                                    <label class="form-check-label" for="status_pendente">
                                        Pendente
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="status_editar_atividade" id="status_editar_atividade" value="Finalizada">
                                    <label class="form-check-label" for="status_finalizada">
                                        Finalizada
                                    </label>
                                </div>
                            </div>
                        </section>
                        
                        <section class="m-2 mb-3">                      
                            <div class="input-group-custom">
                                <i class="fa-solid fa-list-check icon-input"></i>
                                <input id="titulo_editar_atividade" name="titulo_editar_atividade" class="form-control custom-input bg-secondary bg-opacity-10" type="text" placeholder="Digite o Título da Atividade:" required>
                            </div>
                        </section>
                        <section class="m-2 mb-3">                      
                            <div class="input-group-custom">
                                <i class="fa-solid fa-file-alt icon-input"></i>
                                <input id="descricao_editar_atividade" name="descricao_editar_atividade" class="form-control custom-input bg-secondary bg-opacity-10" type="text" placeholder="Digite a Descrição da Atividade:">
                            </div>
                        </section>
                        
                        <section class="m-2 mb-3">                      
                            <div class="d-flex gap-2 align-items-center">
                                <div class="input-group-custom flex-grow-1">
                                    <select class="form-select custom-input bg-secondary bg-opacity-10" name="idMaterias_editar_atividade" id="idMaterias_editar_atividade" required>
                                        <option value="" selected disabled>Escolha uma matéria</option>
                                        </select>
                                </div>
                                <button type="button" class="btn text-light BOTAO_DOURADO d-flex align-items-center justify-content-center"  onclick="exibir_cadastrar_materia();" style="height: 48px; width: 48px; padding: 0; border-radius: 8px;">
                                    <i class="fa-solid fa-plus"></i>
                                </button>
                            </div>
                        </section>

                        <section class="m-2 mb-3">                      
                            <div class="input-group-custom">
                                <i class="fa fa-clock icon-input"></i>
                                <input name="hora_vencimento_editar_atividade" id="hora_vencimento_editar_atividade" class="form-control custom-input bg-secondary bg-opacity-10" type="time" placeholder="Digite o horário de vencimento:" required>
                            </div>
                        </section>
                         <section class="m-2 mb-3">                      
                            <div class="input-group-custom">
                                <i class="fa-regular fa-calendar icon-input"></i>
                                <input name="data_vencimento_editar_atividade" id="data_vencimento_editar_atividade" class="form-control custom-input bg-secondary bg-opacity-10" type="date" required>
                            </div>
                        </section>                        
                        <div class="d-grid gap-2 mt-2 d-flex flex-row justify-content-center">
                            <button type="submit" id="btn_editar_atividade" class="btn text-light BOTAO_DOURADO mb-3">
                                <strong class="me-1">Editar Atividade</strong>
                            </button>
                            <button type="button" onclick="confirmar_exclusao_atividade();" id="btn_deletar_atividade" class="btn btn-danger text-light  mb-3">
                                <strong class="me-1">Deletar Atividade</strong>
                            </button>
                        </div>
                    </form>
                </div>                    
            </div>
        </div>
    </div>

    <div class="modal fade" id="cadastrar_materia"  aria-labelledby="materiaModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-light text-dark">
                <div class="modal-header">
                    <img id="logo_estrela" src="./img/logo_gnosis.png" alt="logo_gnosis">
                    <h5 class="modal-title ms-2" id="materiaModalLabel">Gnosis - Nova Matéria</h5>
                    <button type="button" class="btn-close btn-close-black" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="form_cadastrar_materia">
                        <section class="m-2 mb-3">                      
                            <div class="input-group-custom">
                                <i class="fa-solid fa-book icon-input"></i>
                                <input name="nome_materia" id="nome_materia" class="form-control custom-input bg-secondary bg-opacity-10" type="text" placeholder="Nome da Disciplina (Ex: Cálculo I):" required>
                            </div>
                        </section>
                        <!-- <section class="m-2 mb-3">                      
                            <label class="form-label ms-1 text-secondary" style="font-size: 0.9em;">Cor da Estrela na Constelação:</label>
                            <div class="input-group-custom">
                                <i class="fa-solid fa-palette icon-input"></i>
                                <input name="cor_materia" id="cor_materia" class="form-control custom-input bg-secondary bg-opacity-10" type="color" value="#32A3B1">
                            </div>
                        </section> -->
                        <div class="d-grid mt-2">
                            <button type="submit" id="btnSalvarMateria" class="btn text-light BOTAO_DOURADO">
                                <strong class="me-1">Salvar Matéria</strong>
                            </button>
                        </div>
                    </form>
                </div>                    
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-confirm@3.3.4/js/jquery-confirm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>    
    <script src="/js/app_chamadas.js"></script>  
</body>
</html>
