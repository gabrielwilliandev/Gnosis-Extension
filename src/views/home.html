<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gnosis - Home</title>  
    <script defer src="/js/app_chamadas.js"></script>  
</head>
<body>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            function gerarIconUser(){
                const usuario = JSON.parse(
                    localStorage.getItem('dados_usuario')
                );

                const nome = usuario.nome || 'Estudante';
                const email = usuario.email || 'estudante@gmail.com';
                const icon = document.getElementById('icon-user');
                const campo_email = document.getElementById('email-user');
                const campo_nome = document.getElementById('nome-user');
                
                if(icon && campo_nome && campo_email){
                    icon.innerText = nome.charAt(0).toUpperCase();
                    campo_nome.innerText = nome;
                    campo_email.innerText = email;
                }
                
            }

            gerarIconUser();
        });
    </script>
    <div class="layout-home">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-top">
            <div class="logo-container">
                <div class="logo-icon">
                    <img id="logo_estrela" src="./img/logo_gnosis.png">
                </div>
                <span class="logo-text">
                    Gnosis
                </span>
            </div>

            <div class="user-card">

                <div class="icon_user" id="icon-user"></div>

                <div>
                    <h4 id="nome-user"></h4>
                    <p id="email-user"></p>
                </div>

            </div>

            <nav class="menu-sidebar">

                <button type="button" class="menu-item active">
                    Calendário
                </button>

                <button type="button" class="menu-item">
                    Filtros
                </button>

            </nav>

        </div>

        <div class="sidebar-bottom">
            <!-- POR ENQUANTO VOU COLOCAR APENAS PARA ELE VOLTAR PARA O INDEX -->
            <a href="/" class="logout-button">
                <i class="fa-solid fa-right-from-bracket me-2"></i> Sair da Conta
            </a>

        </div>

    </aside>

    <!-- CONTEÚDO -->
    <main class="main-content">

        <!-- HEADER -->
        <header class="navbar-home">
            <div class="mes-seletor">
                <button id="mes-anterior" class="botoes-mes"><i class="fa-solid fa-angle-left"></i></button>
                <span id="mes-ano" style="margin: 0px 20px;"></span>
                <button id="proximo-mes" class="botoes-mes"><i class="fa-solid fa-angle-right"></i></button>
            </div>

            <div class="havbar-home-acoes">

                <input
                    type="text"
                    placeholder="Buscar atividades..."
                    class="campo-pesquisa-atividade"
                >

                <button type="button" class="btn-add-atividade" data-bs-target="#cadastrar_atividade" data-bs-toggle="modal">
                    + Nova Atividade
                </button>

            </div>

        </header>

        <!-- CALENDÁRIO -->
        <section class="calendario-container">

            <table class="calendario">

                <thead>
                    <tr>
                        <th style="width: 14.285%;">Domingo</th>
                        <th style="width: 14.285%;">Segunda</th>
                        <th style="width: 14.285%;">Terça</th>
                        <th style="width: 14.285%;">Quarta</th>
                        <th style="width: 14.285%;">Quinta</th>
                        <th style="width: 14.285%;">Sexta</th>
                        <th style="width: 14.285%;">Sábado</th>
                    </tr>
                </thead>

                <tbody id="dias-calendario">
                    <!-- DIAS -->
                    <!-- TEM QUE CRIAR UM LAÇO DE REPETIÇÃO DE ACORDO COM O DIA, DEFINIR OS IDS DE ACORDO COM DIA, MES E ANO, PARA PREENCHER DEPOIS DE FORMA DINÂMICA -->
                </tbody>

            </table>

        </section>

    </main>

    </div>
    <!-- MODAIS -->
     <div class="modal fade" id="cadastrar_atividade" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content bg-light text-dark">
                    <div class="modal-header">
                        <img id="logo_estrela" src="./img/logo_gnosis.png" alt="logo_gnosis">
                        <h5 class="modal-title ms-2" id="exampleModalLabel">Gnosis - Cadastrar Atividade</h5>
                        <button type="button" class="btn-close btn-close-black" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="form_cadastrar_atividade">
                            <section class="m-2 mb-3">                       
                                <div class="input-group-custom">
                                    <i class="fa-solid fa-list-check icon-input"></i>
                                    <input name="titulo_cadastrar_atividade" class="form-control custom-input bg-secondary bg-opacity-10" type="text" placeholder="Digite o Título da Atividade:" required>
                                </div>
                            </section>
                            <section class="m-2 mb-3">                       
                                <div class="input-group-custom">
                                    <i class="fa-solid fa-hourglass-half icon-input"></i>
                                    <input name="prazo_cadastrar_atividade" class="form-control custom-input bg-secondary bg-opacity-10" type="number" placeholder="Digite o prazo da Atividade:" required>
                                </div>
                            </section>
                             <section class="m-2 mb-3">                       
                                <div class="input-group-custom">
                                    <i class="fa-regular fa-calendar icon-input"></i>
                                    <input name="data_cadastrar_atividade" class="form-control custom-input bg-secondary bg-opacity-10" type="date" placeholder="Escolha uma data:" required>
                                </div>
                            </section>
                            <div class="d-grid mt-2">
                                <button type="button" class="btn text-light BOTAO_DOURADO">
                                    <strong class="me-1">Cadastrar Atividade</strong>
                                </button>
                            </div>
                        </form>
                    </div>                    
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
